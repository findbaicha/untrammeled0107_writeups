          <h2 class="site-description">Leader OF N0N-7r4mm313d IN HK</h2>

      </header>

      <ol class="menu-social">
        <li><a href="https://github.com/findbaicha " target="_blank">
          <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z"/><path d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5"/></svg>

      <ol class="menu" id="main-menu">
        <li><a href="index.html">
          <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z"/><polyline points="5 12 3 12 12 3 21 12 19 12"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/></svg>

          <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-dark" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z"/><circle cx="8" cy="12" r="2"/><rect x="2" y="6" width="20" height="12" rx="6"/></svg>

    <!-- 右侧：赛事选择 + 该赛事 WP 列表 -->
    <main class="main full-width">
      <h2 style="margin-bottom:1rem;">选择赛事 / Competition</h2>
      <div class="categories">
        <button class="cat-btn active" data-comp="buuctf">BUUCTF</button>
        <button class="cat-btn" data-comp="ctfshow">CTFShow</button>
        <button class="cat-btn" data-comp="moectf2025">Moectf2025</button>
        <button class="cat-btn" data-comp="other">其他赛事（待更新）</button>
      </div>

      <div class="search-box" style="margin-top:1.5rem;">
        <input type="text" id="search" placeholder="Search in this competition...">
      </div>

      <div class="categories" style="margin-top:0.5rem;">
        <button class="cat-btn active" data-cat="all">All</button>
        <button class="cat-btn" data-cat="web">Web</button>
        <button class="cat-btn" data-cat="pwn">Pwn</button>
        <button class="cat-btn" data-cat="reverse">Reverse</button>
        <button class="cat-btn" data-cat="misc">Misc</button>
        <button class="cat-btn" data-cat="crypto">Crypto</button>
      </div>

      <section class="article-list" id="wpList" style="margin-top:1rem;"></section>

      <footer class="site-footer">
        <section class="copyright">&copy; 2026 Untrammeled0107's CTF WriteUPs</section>
        <section class="powerby">Built with GitHub Pages</section>
      </footer>
    </main>
  </div>

<script>
// 赛事 WP 数据（你直接在这里加题目）
const COMP_DATA = {
  "buuctf": [
    { title: "[Web] BUUCTF Love_SQL", cat: "web", date: "2026-4-16", read: "3 min", path: "wps/web/buulovesql/love_sql.html" },
    { title: "[Web] BUUCTF 随便注", cat: "web", date: "2026-4-16", read: "3 min", path: "wps/web/buusuibianzhu/suibianzhu.html" },
    { title: "[Web] BUUCTF Babysql", cat: "web", date: "2026-4-16", read: "3 min", path: "wps/web/buu/babysql/index.html" },
  ],
  "ctfshow": [
    { title: "[Web] CTFShow Base64编码隐藏", cat: "web", date: "2026-4-16", read: "2 min", path: "wps/web/ctfshow/Base64encode/index.html" },
    { title: "[Web] CTFShow HTTP头注入", cat: "web", date: "2026-4-16", read: "2 min", path: "wps/web/ctfshow/http头注入/index.html" }
  ],
  "moectf2025": [
  { title: "[Reverse] MOECTF2025 Speed", cat: "reverse", date: "2026-4-18", read: "4 min", path: "wps/moectf2025/reverse/speed/index.html" },
  { title: "[Reverse] MOECTF2025 逆向工程入门指北", cat: "reverse", date: "2026-4-21", read: "4 min", path: "wps/moectf2025/reverse/入门指北/index.html" },
  { title: "[Reverse] MOECTF2025 Base", cat: "reverse", date: "2026-4-21", read: "4 min", path: "wps/moectf2025/reverse/base/index.html" },
  { title: "[Reverse] MOECTF2025 Catch", cat: "reverse", date: "2026-4-21", read: "4 min", path: "wps/moectf2025/reverse/catch/index.html" },
  { title: "[Reverse] MOECTF2025 UPX", cat: "reverse", date: "2026-4-23", read: "4 min", path: "wps/moectf2025/reverse/upx/index.html" }
],
  "other": []
};

let currentList = COMP_DATA["buuctf"];

// 渲染
function render(list) {
  const container = document.getElementById("wpList");
  container.innerHTML = "";
  if (list.length === 0) {
    container.innerHTML = "<p style='text-align:center;margin-top:3rem;'>暂无 WP，敬请期待</p>";
    return;
  }
  list.forEach(item => {
    const el = document.createElement("div");
    el.className = "article-item";
    el.innerHTML = `
      <a href="${item.path}" target="_blank">
        <h2 class="article-title">${item.title}</h2>
        <div class="article-meta">
          <span class="article-tag">${item.cat.toUpperCase()}</span>
          <span>${item.date}</span>
          <span>${item.read}</span>
        </div>
      </a>
    `;
    container.appendChild(el);
  });
}

render(currentList);

// 赛事切换
document.querySelectorAll("[data-comp]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-comp]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const comp = btn.dataset.comp;
    currentList = COMP_DATA[comp] || [];
    render(currentList);
  });
});

// 分类
document.querySelectorAll("[data-cat]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-cat]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const cat = btn.dataset.cat;
    const filtered = cat === "all" ? currentList : currentList.filter(i => i.cat === cat);
    render(filtered);
  });
});

// 搜索
document.getElementById("search").addEventListener("input", e => {
  const kw = e.target.value.toLowerCase();
  const filtered = currentList.filter(i => i.title.toLowerCase().includes(kw));
  render(filtered);
});

// 暗黑模式
const darkToggle = document.getElementById("dark-mode-toggle");
function setMode(mode) {
  document.documentElement.dataset.scheme = mode;
  localStorage.setItem("scheme", mode);
}
darkToggle.addEventListener("click", () => {
  const current = document.documentElement.dataset.scheme || "light";
  setMode(current === "dark" ? "light" : "dark");
});
window.addEventListener("load", () => {
  const saved = localStorage.getItem("scheme") || "light";
  setMode(saved);
});
</script>
